<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="44" y2="22" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="22" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow-blue">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#3b82f6" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-purple">
      <feDropShadow dx="0" dy="0" stdDeviation="1.5" flood-color="#8b5cf6" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-cyan">
      <feDropShadow dx="0" dy="0" stdDeviation="1.5" flood-color="#06b6d4" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="44" height="44" rx="12" fill="url(#bg)"/>
  <rect x="1" y="1" width="42" height="42" rx="11" fill="none" stroke="white" stroke-width="0.4" opacity="0.08"/>

  <!-- === K VERTICAL BAR — SOFTWARE (code brackets) === -->
  <g filter="url(#glow-blue)">
    <rect x="8" y="6" width="5.5" height="32" rx="2" fill="url(#blue)"/>
    <!-- Code bracket symbols on the bar -->
    <text x="9" y="15" font-family="monospace" font-size="6" font-weight="bold" fill="white" opacity="0.6">&lt;</text>
    <text x="9" y="34" font-family="monospace" font-size="6" font-weight="bold" fill="white" opacity="0.6">/&gt;</text>
  </g>

  <!-- === K UPPER ARM — CRYPTO (blockchain chain) === -->
  <g filter="url(#glow-purple)">
    <!-- Main arm -->
    <path d="M14 19 L17 17 L33 6 L37 6 L37 10.5 L18.5 22 L14 22.5 Z" fill="url(#purple)"/>
    <!-- Blockchain nodes -->
    <circle cx="25" cy="12.5" r="2.5" fill="#1e293b" stroke="#a78bfa" stroke-width="1.2"/>
    <rect x="23.5" y="11" width="3" height="3" rx="0.5" fill="#a78bfa" opacity="0.8"/>
    <!-- Chain endpoint -->
    <circle cx="35" cy="7.5" r="2" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
    <circle cx="35" cy="7.5" r="0.8" fill="#a78bfa"/>
  </g>

  <!-- === K LOWER ARM — TRANSPORT (road/arrow) === -->
  <g filter="url(#glow-cyan)">
    <!-- Main arm as road -->
    <path d="M14 22 L18.5 22 L34 36 L37 38 L30 38 Z" fill="url(#cyan)"/>
    <!-- Road dashes -->
    <line x1="20" y1="27" x2="22" y2="29" stroke="#0f172a" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
    <line x1="24" y1="31" x2="26" y2="33" stroke="#0f172a" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
    <!-- Speed arrow head -->
    <path d="M34 36 L37 38 L37 34 Z" fill="#22d3ee"/>
    <!-- Speed lines -->
    <line x1="29" y1="38" x2="34" y2="38" stroke="#22d3ee" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
    <line x1="31" y1="36" x2="34" y2="36" stroke="#22d3ee" stroke-width="0.6" opacity="0.4" stroke-linecap="round"/>
  </g>

  <!-- Center hub (K junction - connection point) -->
  <circle cx="15" cy="22" r="3.5" fill="#0f172a" stroke="url(#blue)" stroke-width="1.2"/>
  <circle cx="15" cy="22" r="1.5" fill="url(#blue)"/>
</svg>
