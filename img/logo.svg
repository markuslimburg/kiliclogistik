<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="blade" x1="10" y1="6" x2="34" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#c7d2fe"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect width="44" height="44" rx="12" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <rect x="2" y="2" width="40" height="40" rx="10" fill="none" stroke="white" stroke-width="0.5" opacity="0.15"/>
  
  <!-- Sword - angled 30° for dynamic look -->
  <g transform="translate(22,22) rotate(-30) translate(-22,-22)" filter="url(#glow)">
    <!-- Blade tip (pointed) -->
    <path d="M22 5 L24.5 13 L22 14 L19.5 13 Z" fill="white" opacity="0.95"/>
    <!-- Blade body -->
    <path d="M19.5 13 L24.5 13 L24 27 L20 27 Z" fill="url(#blade)" opacity="0.9"/>
    <!-- Blade center line -->
    <line x1="22" y1="8" x2="22" y2="26" stroke="white" stroke-width="0.6" opacity="0.5"/>
    <!-- Guard (curved, not straight cross!) -->
    <path d="M15 27 Q18 25 22 27 Q26 25 29 27 Q26 29 22 28 Q18 29 15 27 Z" fill="white" opacity="0.85"/>
    <!-- Grip (handle) -->
    <rect x="20.5" y="28" width="3" height="6" rx="1" fill="white" opacity="0.7"/>
    <!-- Grip wrap lines -->
    <line x1="20.5" y1="30" x2="23.5" y2="30" stroke="#8b5cf6" stroke-width="0.5" opacity="0.6"/>
    <line x1="20.5" y1="32" x2="23.5" y2="32" stroke="#8b5cf6" stroke-width="0.5" opacity="0.6"/>
    <!-- Pommel (diamond shape) -->
    <path d="M22 34 L24 36 L22 38 L20 36 Z" fill="white" opacity="0.8"/>
  </g>

  <!-- K letter watermark -->
  <text x="7" y="38" font-family="Arial,sans-serif" font-weight="900" font-size="10" fill="white" opacity="0.12">K</text>
</svg>
