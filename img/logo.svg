<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="kLight" x1="8" y1="4" x2="38" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="arrow" x1="20" y1="10" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="44" height="44" rx="12" fill="url(#bg)"/>
  <!-- Inner border -->
  <rect x="1.5" y="1.5" width="41" height="41" rx="11" fill="none" stroke="white" stroke-width="0.6" opacity="0.1"/>

  <!-- Glow behind K -->
  <ellipse cx="22" cy="22" rx="14" ry="16" fill="white" opacity="0.06"/>

  <!-- Big bold K with shadow -->
  <g filter="url(#shadow)">
    <!-- K vertical bar - thick & bold -->
    <path d="M10 6 L16 6 L16 38 L10 38 Z" fill="url(#kLight)"/>
    <!-- K upper arm -->
    <path d="M16 20 L33 6 L39 6 L39 9 L19 22 Z" fill="url(#kLight)"/>
    <!-- K lower arm -->
    <path d="M16 24 L19 22 L39 38 L33 38 Z" fill="url(#kLight)"/>
  </g>

  <!-- Speed arrow on upper arm tip -->
  <path d="M36 6 L39 6 L39 9 Z" fill="url(#arrow)" filter="url(#glow)"/>
  <!-- Speed arrow on lower arm tip -->
  <path d="M36 38 L39 35 L39 38 Z" fill="url(#arrow)" filter="url(#glow)"/>

  <!-- Transport speed lines (left side) -->
  <line x1="3" y1="14" x2="8" y2="14" stroke="white" stroke-width="1.2" opacity="0.35" stroke-linecap="round"/>
  <line x1="4" y1="18" x2="8" y2="18" stroke="white" stroke-width="0.8" opacity="0.25" stroke-linecap="round"/>
  <line x1="4" y1="26" x2="8" y2="26" stroke="white" stroke-width="0.8" opacity="0.25" stroke-linecap="round"/>
  <line x1="3" y1="30" x2="8" y2="30" stroke="white" stroke-width="1.2" opacity="0.35" stroke-linecap="round"/>

  <!-- Tech dot accents -->
  <circle cx="39" cy="6" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="39" cy="38" r="1.2" fill="white" opacity="0.6"/>
</svg>
