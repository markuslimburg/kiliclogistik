<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="grad1" x1="8" y1="8" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#3b82f6" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="44" height="44" rx="12" fill="url(#bg)"/>

  <!-- Outer hexagon ring -->
  <polygon points="22,5 36,13.5 36,30.5 22,39 8,30.5 8,13.5" fill="none" stroke="url(#grad1)" stroke-width="1.5" opacity="0.3"/>

  <!-- Inner hexagon (blockchain block) -->
  <polygon points="22,10 32,16 32,28 22,34 12,28 12,16" fill="none" stroke="url(#grad1)" stroke-width="2" filter="url(#glow)"/>

  <!-- Center diamond/crystal -->
  <polygon points="22,14 28,22 22,30 16,22" fill="url(#grad1)" opacity="0.9"/>

  <!-- Inner cross lines (block hash pattern) -->
  <line x1="16" y1="22" x2="28" y2="22" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <line x1="22" y1="14" x2="22" y2="30" stroke="white" stroke-width="0.8" opacity="0.4"/>

  <!-- Corner connection nodes -->
  <circle cx="22" cy="10" r="1.8" fill="#3b82f6"/>
  <circle cx="32" cy="16" r="1.8" fill="#6366f1"/>
  <circle cx="32" cy="28" r="1.8" fill="#8b5cf6"/>
  <circle cx="22" cy="34" r="1.8" fill="#8b5cf6"/>
  <circle cx="12" cy="28" r="1.8" fill="#6366f1"/>
  <circle cx="12" cy="16" r="1.8" fill="#3b82f6"/>

  <!-- Chain connection lines to outer ring -->
  <line x1="22" y1="5" x2="22" y2="10" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <line x1="36" y1="13.5" x2="32" y2="16" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <line x1="36" y1="30.5" x2="32" y2="28" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
  <line x1="22" y1="39" x2="22" y2="34" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
  <line x1="8" y1="30.5" x2="12" y2="28" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <line x1="8" y1="13.5" x2="12" y2="16" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>

  <!-- Center glow dot -->
  <circle cx="22" cy="22" r="2" fill="white" opacity="0.8"/>
</svg>
